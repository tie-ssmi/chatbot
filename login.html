<!DOCTYPE html>
<html lang="lo-LA">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Language" content="lo-LA">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINA Chatbots - Login</title>
    <meta name="description" content="Login page for SINA Chatbots by SSMI Laos.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS ສະເພາະໜ້າ Login ໃຫ້ກ່ອງຢູ່ເຄິ່ງກາງງາມໆ */
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg-color); }
        .login-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { margin-top: 0; color: var(--primary-color); margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #555; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .input-group input:focus { border-color: var(--primary-color); outline: none; }
        .login-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background-color: #0b3c8a; }
        .login-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        #error-msg { color: #d32f2f; font-size: 0.9em; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <h2>SINA Chatbots</h2>
            <div class="input-group">
                <label>ລະຫັດພະນັກງານ (Username)</label>
                <input type="text" id="username" placeholder="ປ້ອນລະຫັດພະນັກງານ..." required>
            </div>
            <div class="input-group">
                <label>ລະຫັດຜ່ານ (Password)</label>
                <input type="password" id="password" placeholder="ປ້ອນລະຫັດຜ່ານ..." required onkeypress="handleLoginEnter(event)">
            </div>
            <button class="login-btn" id="login-btn" aria-label="Login" onclick="attemptLogin()">ເຂົ້າສູ່ລະບົບ</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login.js"></script> </body>
</html>
